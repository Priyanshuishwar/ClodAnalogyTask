<template>

    <lightning-card title="Task 2">

        <!-- Dynamic Rows -->
        <template for:each={rows} for:item="row">

            <div key={row.id}
                 class="slds-grid slds-wrap slds-gutters slds-m-around_small">

                <!-- Object -->
                <div class="slds-col slds-size_1-of-6">
                    <lightning-combobox
                        label="Object"
                        value={row.obj}
                        options={objectOptions}
                        data-id={row.id}
                        onchange={handleObjectChange}>
                    </lightning-combobox>
                </div>

                <!-- Field -->
                <div class="slds-col slds-size_1-of-6">
                    <lightning-combobox
                        label="Field"
                        value={row.field}
                        options={row.fieldOptions}
                        data-id={row.id}
                        onchange={handleFieldChange}>
                    </lightning-combobox>
                </div>

                <!-- Operator -->
                <div class="slds-col slds-size_1-of-6">
                    <lightning-combobox
                        label="Operator"
                        value={row.op}
                        options={operators}
                        data-id={row.id}
                        onchange={handleOperatorChange}>
                    </lightning-combobox>
                </div>

                <!-- Value -->
                <div class="slds-col slds-size_1-of-6">
                    <lightning-input
                        type="text"
                        label="Value"
                        value={row.inp}
                        data-id={row.id}
                        onchange={handleInputChange}>
                    </lightning-input>
                </div>

                <!-- Toggle -->
                <div class="slds-col slds-size_1-of-6 slds-m-top_large">
                    <lightning-input
                        type="toggle"
                        label="AND">
                    </lightning-input>
                </div>

                <!-- + - Buttons -->
                <div class="slds-col slds-size_1-of-6 slds-m-top_large">

                    <lightning-button-icon
                        icon-name="utility:add"
                        variant="brand"
                        alternative-text="Add"
                        title="Add"
                        onclick={handleIncrement}>
                    </lightning-button-icon>

                    <lightning-button-icon
                        icon-name="utility:dash"
                        variant="destructive"
                        alternative-text="Remove"
                        title="Remove"
                        data-id={row.id}
                        onclick={handleDecrement}
                        class="slds-m-left_small">
                    </lightning-button-icon>

                </div>

            </div>

        </template>

        <!-- Bottom Buttons -->
        <div class="slds-align_absolute-center slds-m-around_medium">

            <lightning-button
                variant="brand"
                label="Generate"
                onclick={handleGenerate}>
            </lightning-button>

            <lightning-button
                variant="neutral"
                label="Clear"
                onclick={handleClear}
                class="slds-m-left_small">
            </lightning-button>

        </div>

    </lightning-card>

    <!-- Datatable -->
    <template if:true={showData}>

        <lightning-card title="Generated Data" class="slds-m-top_medium">

            <div class="slds-p-around_small">
                <lightning-datatable
                    key-field="Id"
                    data={data}
                    columns={columns}>
                </lightning-datatable>
            </div>

        </lightning-card>

    </template>

</template>
