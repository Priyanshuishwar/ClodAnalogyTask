<template>
    <lightning-card title="Object Selector">
        <div class="slds-grid slds-gutters">
            <!-- <template> -->
            <div class="slds-col slds-size_1-of-7">

                <lightning-combobox label="Object" value={selObjectvalue} placeholder="Select object"
                    options={objectOptions} onchange={handleChange}>
                </lightning-combobox>
            </div>

            <div class="slds-col slds-size_1-of-7">
                <lightning-combobox label="Status" value={selFeildValue} placeholder="Select Feild"
                    options={feildOptions} onchange={handlFieldeChange}></lightning-combobox>
            </div>

            <div class="slds-col slds-size_1-of-7">
                <lightning-combobox label="Operator" value={selectedOperator} placeholder="Select Operator"
                    options={operators} onchange={handleOperatorChange}></lightning-combobox>
            </div>

            <div class="slds-col slds-size_1-of-7">
                <lightning-input type="text" label="Value"></lightning-input>
            </div>
            <div class="slds-col slds-size_1-of-7">
                <lightning-input type="toggle" label="AND" variant="toggle" checked={isEnabled}
                    onchange={handleToggle}>
                    ></lightning-input>
            </div>

            <div class="slds-col slds-size_1-of-7">
                <lightning-button-icon icon-name="utility:add" alternative-text="Add" onclick={handleIncrement}>
                </lightning-button-icon>
                <!-- </div> -->

                <!-- <div class="slds-col slds-size_1-of-6"> -->
                <lightning-button-icon icon-name="utility:dash" alternative-text="Remove" onclick={handleDecrement}>
                </lightning-button-icon>
            </div>

        </div>
        <!-- </template> -->

        <div class="slds-grid slds-grid_align-center">
            <div class="slds-m-horizontal_small slds-m-vertical_small">
                <lightning-button variant="brand" label="Generate" onclick={handleGenerate}></lightning-button>
            </div>

            <div class="slds-m-horizontal_small slds-m-vertical_small">
                <lightning-button variant="brand" label="Clear" onclick={handleClick}></lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
